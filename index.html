<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI广告诊断系统（终极版）</title>
</head>

<body style="font-family: Inter, Arial; background:#f3f5f9; margin:0;">

<div style="display:flex; height:100vh;">

  <!-- 左侧输入 -->
  <div style="width:30%; background:white; padding:20px;">
    <h3>📊 输入广告数据</h3>

    <p>曝光</p>
    <input id="imp" value="10000" style="width:100%;margin-bottom:10px;">

    <p>点击</p>
    <input id="clk" value="200" style="width:100%;margin-bottom:10px;">

    <p>转化</p>
    <input id="conv" value="2" style="width:100%;margin-bottom:20px;">

    <button onclick="startAI()" style="width:100%;padding:10px;">
      🚀 开始AI诊断
    </button>
  </div>

  <!-- 右侧对话 -->
  <div style="width:70%; padding:20px;">

    <h2>🤖 AI广告诊断助手</h2>

    <div id="chat" style="background:white;height:70%;overflow:auto;padding:15px;border-radius:12px;margin-bottom:10px;">
      <p>👋 你好，我可以帮你分析广告问题</p>
    </div>

    <input id="userInput" placeholder="继续提问..." style="width:80%;padding:10px;">
    <button onclick="askAI()">发送</button>

  </div>

</div>

<script>

function addMessage(text){
  let chat = document.getElementById("chat");
  chat.innerHTML += "<p>" + text + "</p>";
  chat.scrollTop = chat.scrollHeight;
}

function startAI(){

  let imp = document.getElementById("imp").value;
  let clk = document.getElementById("clk").value;
  let conv = document.getElementById("conv").value;

  let ctr = (clk/imp*100).toFixed(2);
  let cvr = (conv/clk*100).toFixed(2);

  addMessage("📊 数据已接收：CTR=" + ctr + "%，CVR=" + cvr + "%");

  setTimeout(()=> addMessage("🧠 Problem Agent：识别问题中..."),500);
  setTimeout(()=> addMessage("👉 识别结果：CVR偏低"),1000);
  setTimeout(()=> addMessage("🔍 Funnel Agent：点击正常，转化异常"),1500);
  setTimeout(()=> addMessage("📉 Attribution Agent：问题在转化环节"),2000);
  setTimeout(()=> addMessage("💡 Strategy Agent：建议优化落地页与人群匹配"),2500);

}

function askAI(){

  let input = document.getElementById("userInput").value;

  addMessage("🙋‍♂️ " + input);

  setTimeout(()=>{
    addMessage("🤖 AI：可以进一步测试不同素材与人群组合");
  },1000);

}

</script>

</body>
</html>
