<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI广告诊断 Demo</title>
</head>

<body style="font-family: Arial; padding: 20px; background: #f7f7f7;">

<h2>🤖 AI广告诊断系统 Demo</h2>

<!-- 输入区 -->
<div style="background: white; padding: 16px; border-radius: 10px; margin-bottom: 20px;">
  <h3>📊 输入广告数据</h3>
  <p>曝光：10,000</p>
  <p>点击：200</p>
  <p>转化：2</p>
  <p>CTR：2%</p>
  <p>CVR：1%</p>

  <button onclick="runDiagnosis()" style="margin-top:10px; padding:8px 12px;">
    开始诊断
  </button>
</div>

<!-- Agent流程 -->
<div id="steps" style="background: white; padding: 16px; border-radius: 10px; margin-bottom: 20px;">
  <h3>🧠 Agent分析过程</h3>
  <p>（点击按钮后展示）</p>
</div>

<!-- 输出结果 -->
<div id="result" style="background: white; padding: 16px; border-radius: 10px;">
  <h3>📈 诊断结果</h3>
  <p>（等待分析）</p>
</div>

<script>
function runDiagnosis() {

  // Step 1
  document.getElementById("steps").innerHTML = `
  <h3>🧠 Agent分析过程</h3>
  <p>① 问题定义：转化率明显偏低（CVR=1%）</p>
  <p>② 漏斗分析：曝光→点击正常，点击→转化严重下降</p>
  <p>③ 指标归因：问题集中在转化环节</p>
  <p>④ 原因推测：素材与落地页不匹配 / 用户意图不强</p>
  `;

  // Step 2
  document.getElementById("result").innerHTML = `
  <h3>📈 诊断结果</h3>
  <p><b>核心问题：</b>转化率低</p>
  <p><b>可能原因：</b>素材吸引点击但不促转化</p>
  <p><b>优化建议：</b></p>
  <ul>
    <li>优化落地页一致性</li>
    <li>调整定向人群（提升购买意图）</li>
    <li>测试更强转化导向素材</li>
  </ul>
  `;
}
</script>

</body>
</html>
